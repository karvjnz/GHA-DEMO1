# .github/workflows/test3.yml
name: GitHub Actions - Action Demo
on: 
  push:  # on Push Event or Code Commit
    
jobs:
  
  action-demo:                  # This workflow contains a single job called "build". "build" is the name of the job
    runs-on: ubuntu-latest      # The type of runner that the job will run on. Where the job should run. This is called defining the runner
    steps:                      # Steps represent a sequence of tasks that will be executed as part of the job
      - name: checkout the code    # Runs a single command using the runners shell. Name of the step and what this step should do
        uses: actions/checkout@v4

      - name: Print index.html file    # Runs a single command using the runners shell. Name of the step and what this step should do
        run: cat index.html
      
        
